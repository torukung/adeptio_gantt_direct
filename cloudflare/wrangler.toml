name = "adeptio-gantt"
main = "worker.js"
compatibility_date = "2025-01-01"

# --- D1 binding (the Worker reads it as env.DB) ---
# Created via Cloudflare D1; database_id below is the live database.
[[d1_databases]]
binding = "DB"
database_name = "adeptio-gantt"
database_id = "4dbdec99-fdea-411a-b4fa-d8ea3597315e"

# --- Scheduled backups (Cron Triggers) ---
# NOTE: the Workers Builds token can't register cron schedules, so these are
# NOT declared here (that would make every Git build fail on the schedules step).
# Add them once in the dashboard instead — they persist across deploys:
#   Worker > Settings > Triggers > Cron Triggers > Add Cron Trigger
#     0 18 * * *     daily   (18:00 UTC / 01:00 Bangkok)
#     30 18 * * 0    weekly  (Sunday 18:30 UTC)
# The deployed scheduled() handler runs on these and labels the Sunday run
# "weekly" by matching WEEKLY_CRON below.

# Non-secret var so scheduled() can label the weekly run explicitly.
[vars]
WEEKLY_CRON = "30 18 * * 0"

# --- Secrets (set in the dashboard: Settings > Variables and secrets; never commit) ---
#   API_TOKEN                 shared bearer token (must match API_TOKEN in app.js)
#   Dropbox (simplest):
#     DROPBOX_TOKEN           a Dropbox access token
#     -- or refresh-token trio:
#     DROPBOX_REFRESH_TOKEN / DROPBOX_CLIENT_ID / DROPBOX_CLIENT_SECRET
#   Google Drive:
#     GDRIVE_REFRESH_TOKEN / GDRIVE_CLIENT_ID / GDRIVE_CLIENT_SECRET
#   OneDrive (Microsoft Graph):
#     ONEDRIVE_REFRESH_TOKEN / ONEDRIVE_CLIENT_ID / ONEDRIVE_CLIENT_SECRET
